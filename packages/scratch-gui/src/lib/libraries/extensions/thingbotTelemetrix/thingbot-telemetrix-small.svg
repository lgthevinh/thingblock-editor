<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <rect width="40" height="40" fill="hsl(163, 85%, 40%)"/>
  <g stroke="white" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- IC body -->
    <rect x="10" y="10" width="20" height="20" rx="2" stroke-width="1.5" fill="rgba(255,255,255,0.12)"/>
    <!-- Notch -->
    <path d="M 15,10 a 5,5 0 0,0 10,0" stroke-width="1.2"/>
    <!-- Pins left -->
    <line x1="6"  y1="15" x2="10" y2="15" stroke-width="1.5"/>
    <line x1="6"  y1="20" x2="10" y2="20" stroke-width="1.5"/>
    <line x1="6"  y1="25" x2="10" y2="25" stroke-width="1.5"/>
    <!-- Pins right -->
    <line x1="30" y1="15" x2="34" y2="15" stroke-width="1.5"/>
    <line x1="30" y1="20" x2="34" y2="20" stroke-width="1.5"/>
    <line x1="30" y1="25" x2="34" y2="25" stroke-width="1.5"/>
    <!-- Pins top -->
    <line x1="16" y1="6"  x2="16" y2="10" stroke-width="1.5"/>
    <line x1="24" y1="6"  x2="24" y2="10" stroke-width="1.5"/>
    <!-- Pins bottom -->
    <line x1="16" y1="30" x2="16" y2="34" stroke-width="1.5"/>
    <line x1="24" y1="30" x2="24" y2="34" stroke-width="1.5"/>
  </g>
</svg>
